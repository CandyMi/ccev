name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── Linux: GCC + ASAN/UBSAN ────────────────────────────────
  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCCEV_SANITIZE=ON
      - run: cmake --build build -j$(nproc)
      - run: ctest --test-dir build --timeout 15 --output-on-failure

  # ── Linux: Clang + ASAN/UBSAN ──────────────────────────────
  linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCCEV_SANITIZE=ON
      - run: cmake --build build -j$(nproc)
      - run: ctest --test-dir build --timeout 15 --output-on-failure

  # ── Linux: 32-bit (via multilib) ───────────────────────────
  linux-32bit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: sudo apt-get update -qq && sudo apt-get install -y gcc-multilib g++-multilib
      - run: cmake -B build -DCMAKE_C_FLAGS=-m32 -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build -j$(nproc)
      - run: ctest --test-dir build --timeout 15 --output-on-failure

  # ── Linux: Clang + ThreadSanitizer (detects data races) ────
  linux-tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: CC=clang CXX=clang++ cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCCEV_TSAN=ON
      - run: cmake --build build -j$(nproc)
      - run: ctest --test-dir build --timeout 15 --output-on-failure

  # ── Linux: Intel ICC (oneAPI) ─────────────────────────────
  linux-icc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Intel oneAPI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget gnupg
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | sudo gpg --dearmor --output /usr/share/keyrings/intel-oneapi.gpg
          echo "deb [signed-by=/usr/share/keyrings/intel-oneapi.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update -qq && sudo apt-get install -y intel-oneapi-compiler-dpcpp-cpp-and-cpp-classic
      - run: . /opt/intel/oneapi/setvars.sh && cmake -B build -DCMAKE_BUILD_TYPE=Debug
      - run: . /opt/intel/oneapi/setvars.sh && cmake --build build -j$(nproc)
      - run: . /opt/intel/oneapi/setvars.sh && ctest --test-dir build --timeout 15 --output-on-failure

  # ── macOS: AppleClang + ASAN/UBSAN ────────────────────────
  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCCEV_SANITIZE=ON
      - run: cmake --build build -j$(sysctl -n hw.logicalcpu)
      - run: ctest --test-dir build --timeout 15 --output-on-failure

  # ── iOS: arm64 (physical device) via Xcode ────────────────
  ios-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure for iOS arm64
        run: cmake -B build -G Xcode -DCMAKE_SYSTEM_NAME=iOS \
                    -DCMAKE_OSX_SYSROOT=iphoneos \
                    -DCMAKE_OSX_ARCHITECTURES=arm64 \
                    -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF
      # Build only the ccev library target — Xcode's ALL_BUILD tries
      # to build test executables as iOS app bundles which fails
      # (missing PRODUCT_BUNDLE_IDENTIFIER).
      - run: cmake --build build --config Debug -j$(sysctl -n hw.logicalcpu) --target ccev

  # ── iOS: x86_64 (simulator) via Xcode ─────────────────────
  ios-simulator:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure for iOS Simulator x86_64
        run: cmake -B build -G Xcode -DCMAKE_SYSTEM_NAME=iOS \
                    -DCMAKE_OSX_SYSROOT=iphonesimulator \
                    -DCMAKE_OSX_ARCHITECTURES=x86_64 \
                    -DBUILD_TESTING=ON -DBUILD_EXAMPLES=OFF
      - name: Build test binaries (timer + sock + stream)
        run: cmake --build build --config Debug -j$(sysctl -n hw.logicalcpu) --target test_timer --target test_sock --target test_stream
      - name: Boot iOS Simulator
        run: |
          xcrun simctl shutdown all 2>/dev/null || true
          RUNTIME=$(xcrun simctl list runtimes available | grep "iOS" | tail -1 | sed 's/.* - //')
          DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro"
          DEVICE_UUID=$(xcrun simctl create ccev-test "$DEVICE_TYPE" "$RUNTIME")
          echo "Device UUID: $DEVICE_UUID"
          xcrun simctl boot "$DEVICE_UUID"
          xcrun simctl bootstatus "$DEVICE_UUID" -b
      - name: Run test_timer in simulator
        run: xcrun simctl spawn booted build/Debug-iphonesimulator/test_timer
      - name: Run test_sock in simulator
        run: xcrun simctl spawn booted build/Debug-iphonesimulator/test_sock
      - name: Run test_stream in simulator
        run: xcrun simctl spawn booted build/Debug-iphonesimulator/test_stream
      - name: Shutdown simulator
        run: xcrun simctl shutdown booted 2>/dev/null || true

  # ── tvOS: arm64 (Apple TV) via Xcode ─────────────────────
  tvos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure for tvOS arm64
        run: cmake -B build -G Xcode -DCMAKE_SYSTEM_NAME=tvOS \
                    -DCMAKE_OSX_SYSROOT=appletvos \
                    -DCMAKE_OSX_ARCHITECTURES=arm64 \
                    -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF
      - run: cmake --build build --config Debug -j$(sysctl -n hw.logicalcpu) --target ccev

  # ── visionOS: arm64 (Apple Vision Pro) via Xcode ─────────
  visionos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure for visionOS arm64
        run: cmake -B build -G Xcode -DCMAKE_SYSTEM_NAME=visionOS \
                    -DCMAKE_OSX_ARCHITECTURES=arm64 \
                    -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF
      - run: cmake --build build --config Debug -j$(sysctl -n hw.logicalcpu) --target ccev

  # ── Android: arm64-v8a via NDK ────────────────────────────
  android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27
      - name: Configure for Android arm64-v8a
        run: cmake -B build \
                    -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
                    -DANDROID_ABI=arm64-v8a \
                    -DANDROID_PLATFORM=android-21 \
                    -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF \
                    -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build -j$(nproc)

  # ── Android: armeabi-v7a (32-bit ARM) via NDK ─────────────
  android-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27
      - name: Configure for Android armeabi-v7a
        run: cmake -B build \
                    -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
                    -DANDROID_ABI=armeabi-v7a \
                    -DANDROID_PLATFORM=android-21 \
                    -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF \
                    -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build -j$(nproc)

  # ── Android: x86_64 (emulator) via NDK ────────────────────
  android-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27
      - name: Set up JDK for Android emulator
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
      - name: Configure for Android x86_64 (with tests)
        run: cmake -B build \
                    -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
                    -DANDROID_ABI=x86_64 \
                    -DANDROID_PLATFORM=android-21 \
                    -DBUILD_TESTING=ON -DBUILD_EXAMPLES=OFF \
                    -DCMAKE_BUILD_TYPE=Debug
      - name: Build library + tests
        run: cmake --build build -j$(nproc)
      - name: Boot Android emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          avd-name: ccev-test
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512 -memory 2048 -no-snapshot
          disable-animations: true
          emulator-boot-timeout: 600
          script: |
            for test in test_timer test_sock test_stream; do echo ""; echo "=== Running $test ==="; adb push ${{ github.workspace }}/build/tests/$test /data/local/tmp/; adb shell chmod +x /data/local/tmp/$test; adb shell /data/local/tmp/$test; done

  # ── Windows: MSVC x64 ─────────────────────────────────────
  windows-msvc-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build
      - run: ctest --test-dir build --timeout 15 -C Debug --output-on-failure

  # ── Windows: MSVC x86 ─────────────────────────────────────
  windows-msvc-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
      - run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build
      - run: ctest --test-dir build --timeout 15 -C Debug --output-on-failure

  # ── Windows: ClangCL (clang-cl frontend) ──────────────────
  windows-clangcl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build
      - run: ctest --test-dir build --timeout 15 -C Debug --output-on-failure

  # ── Windows: MinGW-w64 x64 ────────────────────────────────
  windows-mingw64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            make
      - run: cmake -B build -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build -j$(nproc)
      - run: ctest --test-dir build --timeout 15 --output-on-failure

  # ── Windows: MinGW-w64 x86 ────────────────────────────────
  windows-mingw32:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            make
      - run: cmake -B build -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Debug
      - run: cmake --build build -j$(nproc)
      - run: ctest --test-dir build --timeout 15 --output-on-failure
